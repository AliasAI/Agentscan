services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentscan-backend
    ports:
      - "8001:8000"
    volumes:
      # 持久化 SQLite 数据库
      - ./data:/app/data
      # 持久化日志
      - ./logs/backend:/app/logs
    environment:
      - DATABASE_URL=sqlite:///./data/8004scan.db
      - CORS_ORIGINS=http://localhost:3000,https://agentscan.info,https://www.agentscan.info,http://agentscan.info,http://www.agentscan.info
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - agentscan-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
        - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
    container_name: agentscan-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentscan-network

networks:
  agentscan-network:
    driver: bridge

volumes:
  data:
  logs:
